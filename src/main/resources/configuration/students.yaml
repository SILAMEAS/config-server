spring:
  application:
    name: students
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_STUDENT}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT_STUDENT}


# Eureka client Config
eureka:
  instance:
    hostname: ${HOSTNAME_EUREKA}
  client:
    service-url:
      defaultZone: ${URI_EUREKA_SERVER_URL}

